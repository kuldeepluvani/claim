# CLAIM Configuration
# Edit this file before running install.sh

# --- Vault ---
# Absolute path to your Obsidian vault (or any folder for structured notes)
vault_path: ""

# Folders to create inside the vault
vault_folders:
  - Services
  - Tickets
  - Plans
  - Architecture
  - Incidents
  - Runbooks

# --- Capture Behavior ---
# "autonomous" = save silently without asking
# "confirm"    = propose memory, wait for user approval before saving
capture_mode: autonomous

# "background" = dispatch background Agent (no interruption)
# "inline"     = save directly during response (immediate)
save_mode: background

# --- Sweep ---
# Number of prompts between periodic memory sweeps (0 = disabled)
sweep_interval: 10

# --- Custom Types ---
# Add your own memory types beyond the 4 built-in (user, feedback, project, reference)
# custom_types:
#   - name: recipe
#     description: "Reusable patterns and solutions"
#     when_to_save: "When a non-obvious solution works"
#     body_structure: "Pattern, Context, Example"
custom_types: []

# --- Index ---
# Max lines for MEMORY.md before triggering a prune warning
max_index_lines: 200
