services:
  claim-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claim-v3-test
    ports:
      - "2626:2626"   # CLAIM Web UI + Worker API
      - "2627:2627"   # CLAIM MCP Server
    volumes:
      # Persist CLAIM data between container restarts
      - claim-data:/root/.claim
      # Persist Claude auth so you don't re-login every restart
      - claude-config:/root/.claude
    stdin_open: true
    tty: true
    working_dir: /workspace/sample-project

volumes:
  claim-data:
  claude-config:
